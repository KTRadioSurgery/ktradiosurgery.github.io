<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neurocognitive Trace Test</title>

<style>
  body { text-align:center; font-family:Arial,sans-serif; }
  input { padding:8px; width:200px; }
  .trace-area {
    width:300px; height:300px;
    margin:20px auto;
    border:2px solid black;
    background:#f5f5f5;
    touch-action:none;
  }
  canvas { display:block; }
  button { padding:10px 20px; font-size:16px; margin:10px; }
</style>
</head>

<body>

<h2 id="instruction"></h2>
<input id="username" placeholder="Enter your name">

<div class="trace-area">
  <canvas id="canvas" width="300" height="300"></canvas>
</div>

<button id="nextBtn">Next</button>
<button id="sendBtn" style="display:none;">Send Data</button>

<script>
/* ================= GLOBAL ================= */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
ctx.lineWidth = 3;
ctx.lineCap = "round";

const instruction = document.getElementById("instruction");
const nextBtn = document.getElementById("nextBtn");
const sendBtn = document.getElementById("sendBtn");

let drawingEnabled = false;
let drawing = false;
let startTime = null;

const shapes = ["square","triangle","circle","star","hash"];
let currentShape = null;

/* ================= STATE ================= */
let phase = "spiral"; 
// spiral → shape-trace → shape-memory → done

const data = [];

/* ================= STIMULI ================= */
function clearCanvas(){
  ctx.clearRect(0,0,300,300);
}

function drawSpiral(){
  clearCanvas();
  ctx.strokeStyle="#bbb";
  ctx.beginPath();
  const cx=150, cy=150;
  for(let t=0;t<8*Math.PI;t+=0.05){
    const r=2+4*t;
    const x=cx+r*Math.cos(t);
    const y=cy+r*Math.sin(t);
    t===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();
}

function drawShape(name){
  clearCanvas();
  ctx.strokeStyle="#bbb";
  ctx.beginPath();

  if(name==="square") ctx.rect(60,60,180,180);
  if(name==="triangle"){
    ctx.moveTo(150,40); ctx.lineTo(260,260);
    ctx.lineTo(40,260); ctx.closePath();
  }
  if(name==="circle") ctx.arc(150,150,90,0,2*Math.PI);
  if(name==="hash"){
    ctx.moveTo(100,40); ctx.lineTo(100,260);
    ctx.moveTo(200,40); ctx.lineTo(200,260);
    ctx.moveTo(40,100); ctx.lineTo(260,100);
    ctx.moveTo(40,200); ctx.lineTo(260,200);
  }
  if(name==="star"){
    const cx=150, cy=150, r1=90, r2=40;
    for(let i=0;i<10;i++){
      const r=i%2?r2:r1;
      const a=Math.PI/2+i*Math.PI/5;
      ctx.lineTo(cx+r*Math.cos(a), cy-r*Math.sin(a));
    }
    ctx.closePath();
  }
  ctx.stroke();
}

/* ================= DRAWING ================= */
function pos(e){
  const r=canvas.getBoundingClientRect();
  const p=e.touches?e.touches[0]:e;
  return {x:p.clientX-r.left,y:p.clientY-r.top};
}

function record(x,y){
  data.push({
    phase,
    stimulus: phase==="spiral"?"spiral":currentShape,
    x,y,
    t:performance.now()-startTime
  });
}

function startDraw(e){
  if(!drawingEnabled) return;
  drawing=true;
  ctx.strokeStyle="black";
  ctx.beginPath();
  const {x,y}=pos(e);
  ctx.moveTo(x,y);
  startTime ??= performance.now();
  record(x,y);
}

function moveDraw(e){
  if(!drawing) return;
  e.preventDefault();
  const {x,y}=pos(e);
  ctx.lineTo(x,y);
  ctx.stroke();
  record(x,y);
}

function stopDraw(){
  drawing=false;
}

/* ================= EVENTS ================= */
canvas.addEventListener("mousedown",startDraw);
canvas.addEventListener("mousemove",moveDraw);
canvas.addEventListener("mouseup",stopDraw);
canvas.addEventListener("touchstart",startDraw);
canvas.addEventListener("touchmove",moveDraw);
canvas.addEventListener("touchend",stopDraw);

/* ================= FLOW ================= */
function updateUI(){
  clearCanvas();
  drawingEnabled=false;
  startTime=null;

  if(phase==="spiral"){
    instruction.innerText="Phase 1: Trace the spiral";
    drawSpiral();
    drawingEnabled=true;
    nextBtn.style.display="block";
    sendBtn.style.display="none";
  }

  if(phase==="shape-trace"){
    instruction.innerText=`Phase 2: Trace the ${currentShape}`;
    drawShape(currentShape);
    drawingEnabled=true;
  }

  if(phase==="shape-memory"){
    instruction.innerText=`Draw the ${currentShape} from memory`;
    drawingEnabled=true;
    clearCanvas();
    nextBtn.style.display="none";
    sendBtn.style.display="block";
  }
}

nextBtn.onclick=()=>{
  if(phase==="spiral"){
    phase="shape-trace";
    currentShape=shapes[Math.floor(Math.random()*shapes.length)];
  } else if(phase==="shape-trace"){
    phase="shape-memory";
  }
  updateUI();
};

/* ================= SEND ================= */
sendBtn.onclick=()=>{
  const name=document.getElementById("username").value||"Anonymous";
  const payload={ name, completed:new Date().toISOString(), data };
  const body=encodeURIComponent(JSON.stringify(payload));
  window.location.href=
    `mailto:?subject=Neurocognitive Trace Test&body=${body}`;
};

/* ================= INIT ================= */
updateUI();
</script>

</body>
</html>
