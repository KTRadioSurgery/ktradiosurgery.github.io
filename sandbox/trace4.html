<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- Prevent mobile zoom & layout jump -->
<meta name="viewport"
  content="width=device-width,
           height=device-height,
           initial-scale=1.0,
           maximum-scale=1.0,
           user-scalable=no">

<title>Neurocognitive Trace Test</title>

<style>
/* ---------- GLOBAL ---------- */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: #ffffff;
  overflow: hidden;
}

/* ---------- SCREENS ---------- */
.screen {
  display: none;
  height: 100%;
  width: 100%;
}

.screen.active {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* ---------- NAME SCREEN ---------- */
#nameScreen input {
  font-size: 16px; /* critical: prevents iOS zoom */
  padding: 10px;
  width: 220px;
  margin-bottom: 20px;
}

/* ---------- TEST LAYOUT ---------- */
#testScreen {
  display: grid;
  grid-template-rows: auto 1fr auto;
  height: 100%;
  padding: 10px;
  box-sizing: border-box;
}

/* ---------- INSTRUCTION ---------- */
#instruction {
  text-align: center;
  font-size: 18px;
  margin: 10px 0;
}

/* ---------- CANVAS ---------- */
.trace-area {
  display: flex;
  justify-content: center;
  align-items: center;
}

canvas {
  width: 300px;
  height: 300px;
  border: 2px solid black;
  background: #f5f5f5;
  touch-action: none;
}

/* ---------- BUTTONS ---------- */
.button-row {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 10px;
}

button {
  font-size: 16px;
  padding: 10px 20px;
}
</style>
</head>

<body>

<!-- ================= NAME SCREEN ================= -->
<div id="nameScreen" class="screen active">
  <h2>Enter Your Name</h2>
  <input id="username" placeholder="Your name">
  <button onclick="startTest()">Continue</button>
</div>

<!-- ================= TEST SCREEN ================= -->
<div id="testScreen" class="screen">

  <div id="instruction"></div>

  <div class="trace-area">
    <canvas id="canvas" width="300" height="300"></canvas>
  </div>

  <div class="button-row">
    <button id="nextBtn">Next</button>
    <button id="sendBtn" style="display:none;">Send Data</button>
  </div>

</div>

<script>
/* ========== SCREEN CONTROL ========== */
function startTest() {
  document.getElementById("nameScreen").classList.remove("active");
  document.getElementById("testScreen").classList.add("active");
  updateUI();
}

/* ========== SETUP ========== */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
ctx.lineWidth = 3;
ctx.lineCap = "round";

const instruction = document.getElementById("instruction");
const nextBtn = document.getElementById("nextBtn");
const sendBtn = document.getElementById("sendBtn");

/* ========== STATE ========== */
let phase = "spiral";
let drawingEnabled = false;
let drawing = false;
let startTime = null;

const shapes = ["square","triangle","circle","star","hash"];
let currentShape = null;
const data = [];

/* ========== STIMULI ========== */
function clearCanvas() {
  ctx.clearRect(0,0,300,300);
}

function drawSpiral() {
  clearCanvas();
  ctx.strokeStyle="#bbb";
  ctx.beginPath();
  const cx=150, cy=150;
  for(let t=0;t<8*Math.PI;t+=0.05){
    const r=2+4*t;
    const x=cx+r*Math.cos(t);
    const y=cy+r*Math.sin(t);
    t===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();
}

function drawShape(name) {
  clearCanvas();
  ctx.strokeStyle="#bbb";
  ctx.beginPath();
  if(name==="square") ctx.rect(60,60,180,180);
  if(name==="triangle"){
    ctx.moveTo(150,40);
    ctx.lineTo(260,260);
    ctx.lineTo(40,260);
    ctx.closePath();
  }
  if(name==="circle") ctx.arc(150,150,90,0,2*Math.PI);
  if(name==="hash"){
    ctx.moveTo(100,40); ctx.lineTo(100,260);
    ctx.moveTo(200,40); ctx.lineTo(200,260);
    ctx.moveTo(40,100); ctx.lineTo(260,100);
    ctx.moveTo(40,200); ctx.lineTo(260,200);
  }
  if(name==="star"){
    const cx=150, cy=150, r1=90, r2=40;
    for(let i=0;i<10;i++){
      const r=i%2?r2:r1;
      const a=Math.PI/2 + i*Math.PI/5;
      ctx.lineTo(cx+r*Math.cos(a), cy-r*Math.sin(a));
    }
    ctx.closePath();
  }
  ctx.stroke();
}

/* ========== DRAWING ========== */
function getPos(e){
  const rect = canvas.getBoundingClientRect();
  const p = e.touches ? e.touches[0] : e;
  return { x: p.clientX - rect.left, y: p.clientY - rect.top };
}

function record(x,y){
  data.push({
    phase,
    stimulus: phase==="spiral"?"spiral":currentShape,
    x,y,
    t: performance.now()-startTime
  });
}

function startDraw(e){
  if(!drawingEnabled) return;
  drawing=true;
  ctx.strokeStyle="black";
  ctx.beginPath();
  const {x,y}=getPos(e);
  ctx.moveTo(x,y);
  startTime ??= performance.now();
  record(x,y);
}

function moveDraw(e){
  if(!drawing) return;
  e.preventDefault();
  const {x,y}=getPos(e);
  ctx.lineTo(x,y);
  ctx.stroke();
  record(x,y);
}

function stopDraw(){ drawing=false; }

canvas.addEventListener("mousedown",startDraw);
canvas.addEventListener("mousemove",moveDraw);
canvas.addEventListener("mouseup",stopDraw);
canvas.addEventListener("touchstart",startDraw);
canvas.addEventListener("touchmove",moveDraw);
canvas.addEventListener("touchend",stopDraw);

/* ========== FLOW ========== */
function updateUI(){
  clearCanvas();
  drawingEnabled=false;
  startTime=null;

  if(phase==="spiral"){
    instruction.textContent="Trace the spiral";
    drawSpiral();
    drawingEnabled=true;
    nextBtn.style.display="inline";
    sendBtn.style.display="none";
  }

  if(phase==="shape-trace"){
    instruction.textContent=`Trace the ${currentShape}`;
    drawShape(currentShape);
    drawingEnabled=true;
  }

  if(phase==="shape-memory"){
    instruction.textContent=`Draw the ${currentShape} from memory`;
    clearCanvas();
    drawingEnabled=true;
    nextBtn.style.display="none";
    sendBtn.style.display="inline";
  }
}

nextBtn.onclick=()=>{
  if(phase==="spiral"){
    phase="shape-trace";
    currentShape = shapes[Math.floor(Math.random()*shapes.length)];
  } else if(phase==="shape-trace"){
    phase="shape-memory";
  }
  updateUI();
};

/* Send button left unchanged per your request */

</script>

</body>
</html>
